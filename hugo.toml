baseURL = 'https://abhijith-nagarajan.com'
locale = 'en-us'
title = 'Abhijith Nagarajan'
theme = 'PaperMod'

[params]
    env = 'production'
    title = 'Abhijith Nagarajan'
    description = 'Applied AI, Predictive Modeling, and Enterprise Automation'
    hideFooter = true

    [params.label]
        text = 'abhijith-nagarajan'

    # Landing-page content (consumed by layouts/index.html).
    # `headline` renders in UPPERCASE (Manrope) — the designation.
    # `subhead` stays in normal case — the pitch line.
    # `pitch` is the focus-areas list, separated by interpuncts.
    [params.landing]
        headline = 'Applied AI Engineer & Data Scientist'
        subhead = 'Building scalable AI, analytics, and automation systems from prototype to production.'
        pitch = 'LLM/RAG Systems · Agentic AI · Predictive Modeling · Operational Analytics · Automation'
        email = 'abhijith3008@gmail.com'

# Top-right navigation: text tabs + social icons in one nav bar.
[[menu.main]]
    identifier = 'about'
    name = 'About'
    url = '/about/'
    weight = 10

[[menu.main]]
    identifier = 'projects'
    name = 'Projects'
    url = '/projects/'
    weight = 20

[[menu.main]]
    identifier = 'blogs'
    name = 'Blogs'
    url = '/blogs/'
    weight = 30

# Taxonomies: tags (default) and companies (for grouping multiple roles
# at the same employer). Add `companies: ["Name"]` to a content page to
# generate /companies/name/ aggregating all entries.
[taxonomies]
    tag = "tags"
    category = "categories"
    company = "companies"